<div class="auth-container">
  <div class="auth-card card">
    <div class="auth-header">
      <div class="logo">
        <i class="bi bi-chat-fill"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Enter your details to access your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" class="pill-input" placeholder="name@company.com" />
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors" class="error-text">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="pill-input" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </div>
  </div>
</div>
