<div class="auth-container">
  <div class="auth-card card">
    <div class="auth-header">
      <div class="logo">
        <i class="bi bi-chat-fill"></i>
      </div>
      <h1>Create account</h1>
      <p>Join ByteChat today</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="fullName" class="pill-input" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" formControlName="phone" class="pill-input" placeholder="+1..." />
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" class="pill-input" placeholder="name@company.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="pill-input" placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="registerForm.invalid || loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </div>
  </div>
</div>
