<div class="profile-container">
  <header class="profile-header">
    <button class="mobile-back-btn" (click)="onBack()">
      <i class="bi bi-chevron-left"></i>
    </button>
    <div class="header-text">
      <h1>Your Profile</h1>
      <p class="subtitle">Manage your personal information and account settings</p>
    </div>
  </header>


  <div class="profile-content">
    <div class="profile-card card">
      <div class="avatar-section">
        <div class="large-avatar" (click)="fileInput.click()">
          <img *ngIf="currentUserProfile()?.profileImage" [src]="currentUserProfile()?.profileImage" class="profile-preview">
          <span *ngIf="!currentUserProfile()?.profileImage">{{ userInitials }}</span>
          
          <div class="upload-overlay" *ngIf="uploading()">
            <div class="spinner"></div>
          </div>

          <button class="edit-avatar-btn">
            <i class="bi bi-camera"></i>
          </button>
          <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" hidden />
        </div>
        <div class="avatar-meta">
          <h3>Profile Photo</h3>
          <p>Click photo to change. Max size 2MB.</p>
        </div>
      </div>

      <div class="divider"></div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" formControlName="fullName" class="pill-input" />
            <small class="help-text">Name cannot be changed.</small>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" formControlName="email" class="pill-input" />
            <small class="help-text">Email cannot be changed.</small>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" formControlName="phone" class="pill-input" />
            <small class="help-text">Phone number cannot be changed.</small>
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea formControlName="bio" class="pill-input" rows="3" placeholder="Tell us about yourself..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid || loading()">
            {{ loading() ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
